name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: "Node ${{ matrix.node-version }}${{ matrix.label || '' }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        strip-ws: [false]
        include:
          - node-version: 22
            strip-ws: true
            label: " (no ws)"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Strip ws optional dependency
        if: matrix.strip-ws
        run: rm -rf node_modules/ws

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        if: matrix.node-version == 22 && !matrix.strip-ws
        run: npx vitest run --coverage

      - name: Build
        run: pnpm build

      - name: Verify CJS export
        run: node -e "const m = require('./dist/index.js'); if (!m.OpenClawClient) throw new Error('CJS export missing')"

      - name: Verify ESM export
        run: node --input-type=module -e "import { OpenClawClient } from './dist/index.mjs'; if (!OpenClawClient) throw new Error('ESM export missing')"

      - name: Verify package contents
        if: matrix.node-version == 22 && !matrix.strip-ws
        run: |
          pnpm pack
          tar tzf openclaw-node-*.tgz | sort
          # Fail if test files, source maps, or config files leak into the tarball
          if tar tzf openclaw-node-*.tgz | grep -qE '(\.test\.|\.spec\.|tsconfig|eslint|\.env)'; then
            echo "ERROR: Unexpected files in package tarball!"
            exit 1
          fi

      - name: Check package size
        if: matrix.node-version == 22 && !matrix.strip-ws
        run: |
          SIZE=$(wc -c < openclaw-node-*.tgz | tr -d ' ')
          echo "Package size: ${SIZE} bytes"
          MAX_SIZE=51200  # 50 kB
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: Package size ${SIZE} bytes exceeds limit of ${MAX_SIZE} bytes (50 kB)"
            exit 1
          fi

  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Check dependency licenses
        run: |
          # List all production dependency licenses and fail on copyleft/proprietary
          LICENSES=$(pnpm licenses list --prod --json 2>/dev/null || echo "[]")
          FORBIDDEN='GPL|AGPL|SSPL|EUPL|OSL|CPAL|CPL|Sleepycat|Watcom'
          VIOLATIONS=$(echo "$LICENSES" | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const forbidden = new RegExp('$FORBIDDEN', 'i');
            const violations = [];
            for (const [license, pkgs] of Object.entries(data)) {
              if (forbidden.test(license)) {
                for (const pkg of pkgs) {
                  violations.push(pkg.name + '@' + pkg.version + ' (' + license + ')');
                }
              }
            }
            if (violations.length) {
              console.log('INCOMPATIBLE LICENSES FOUND:');
              violations.forEach(v => console.log('  - ' + v));
              process.exit(1);
            }
            console.log('All production dependency licenses are MIT-compatible.');
          ")
