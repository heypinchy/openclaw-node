name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on release commit
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Checking the CI workflow run for commit $COMMIT_SHA ..."

          # Gate ONLY on this repo's CI workflow (ci.yml), not on every
          # github-actions check-run for the commit. GitHub's own "Dependabot
          # Updates" recompute posts a "Dependabot" check-run (app.slug
          # "github-actions") that can sit `in_progress` right after a dev-deps
          # PR merges to main; gating on all check-runs blocked the v0.13.0
          # release on that unrelated check. The CI workflow's run conclusion is
          # `success` only when every CI job (Node matrix, Security audit, …)
          # passed, so it is the authoritative, Dependabot-proof signal.
          RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$COMMIT_SHA&per_page=20" \
            --jq '.workflow_runs | sort_by(.created_at) | last')

          if [ -z "$RUN" ] || [ "$RUN" = "null" ]; then
            echo "ERROR: No CI workflow run found for $COMMIT_SHA."
            echo "Ensure the CI workflow ran on the release commit before publishing."
            exit 1
          fi

          STATUS=$(echo "$RUN" | jq -r '.status')
          CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')
          echo "CI workflow run: status=$STATUS conclusion=$CONCLUSION"
          echo "$RUN" | jq -r '"  " + .html_url'

          if [ "$STATUS" != "completed" ] || [ "$CONCLUSION" != "success" ]; then
            echo ""
            echo "ERROR: CI has not passed on the release commit (status=$STATUS, conclusion=$CONCLUSION)."
            echo "Ensure the CI workflow is green before creating a release."
            exit 1
          fi

          echo ""
          echo "CI workflow passed."
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Build & Publish
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches release tag
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm pack --dry-run

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
