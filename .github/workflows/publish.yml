name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on release commit
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Checking CI check runs for commit $COMMIT_SHA ..."

          # GitHub Actions uses the Checks API, not the Status API.
          # Exclude this workflow's own check runs to avoid self-referential failure.
          CHECKS=$(gh api "repos/${{ github.repository }}/commits/$COMMIT_SHA/check-runs" \
            --jq '.check_runs[] | select(.app.slug == "github-actions" and .name != "Verify CI passed" and .name != "Build & Publish") | {name, status, conclusion}')

          echo "Check runs:"
          echo "$CHECKS" | jq -r '"\(.name): \(.status) / \(.conclusion)"'

          # Fail if any check has not completed or has a non-success conclusion
          FAILED=$(echo "$CHECKS" | jq -r 'select(.status != "completed" or (.conclusion != "success" and .conclusion != "skipped")) | .name')
          if [ -n "$FAILED" ]; then
            echo ""
            echo "ERROR: The following CI checks have not passed:"
            echo "$FAILED"
            echo ""
            echo "Ensure all CI checks are green before creating a release."
            exit 1
          fi

          echo ""
          echo "All CI checks passed."
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Build & Publish
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches release tag
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm pack --dry-run

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
